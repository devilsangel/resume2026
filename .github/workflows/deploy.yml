name: Build and Deploy Resume

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex
          latexmk_use_xelatex: false
          extra_system_packages: "font-liberation"
          args: -pdf -file-line-error -halt-on-error -interaction=nonstopmode -jobname=Kevin_Joseph_Resume_2026

      - name: Create GitHub Pages site
        run: |
          mkdir -p _site
          cp Kevin_Joseph_Resume_2026.pdf _site/
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>Kevin Joseph — Resume</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                background: #1a1a2e;
                color: #e0e0e0;
                height: 100vh;
                display: flex;
                flex-direction: column;
              }
              header {
                padding: 12px 24px;
                background: #16213e;
                border-bottom: 1px solid #0f3460;
                display: flex;
                align-items: center;
                justify-content: space-between;
                flex-shrink: 0;
              }
              header h1 {
                font-size: 1rem;
                font-weight: 600;
                letter-spacing: 0.5px;
                color: #e0e0e0;
              }
              header span {
                font-size: 0.75rem;
                color: #888;
              }
              a.download {
                display: inline-block;
                padding: 6px 16px;
                background: #0f3460;
                color: #e0e0e0;
                text-decoration: none;
                border-radius: 4px;
                font-size: 0.85rem;
                border: 1px solid #1a4a8a;
                transition: background 0.2s;
              }
              a.download:hover { background: #1a4a8a; }
              .viewer {
                flex: 1;
                overflow: hidden;
              }
              iframe {
                width: 100%;
                height: 100%;
                border: none;
                display: block;
              }
            </style>
          </head>
          <body>
            <header>
              <h1>Kevin Joseph &mdash; Resume</h1>
              <div style="display:flex;align-items:center;gap:16px;">
                <span>Updated: ${{ github.event.head_commit.timestamp || 'latest' }}</span>
                <a class="download" href="Kevin_Joseph_Resume_2026.pdf" download>Download PDF</a>
              </div>
            </header>
            <div class="viewer">
              <iframe src="Kevin_Joseph_Resume_2026.pdf#toolbar=0&navpanes=0" title="Kevin Joseph Resume"></iframe>
            </div>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true
