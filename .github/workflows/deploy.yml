name: Build and Deploy Resume

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex
          latexmk_use_xelatex: false
          extra_system_packages: "font-liberation"
          args: -pdf -file-line-error -halt-on-error -interaction=nonstopmode -jobname=Kevin_Joseph_Resume_2026

      - name: Create GitHub Pages site
        run: |
          mkdir -p _site
          cp Kevin_Joseph_Resume_2026.pdf _site/
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>Kevin Joseph — Resume</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                background: #1a1a2e;
                color: #e0e0e0;
                height: 100vh;
                display: flex;
                flex-direction: column;
                overflow: hidden;
              }
              header {
                padding: 12px 24px;
                background: #16213e;
                border-bottom: 1px solid #0f3460;
                display: flex;
                align-items: center;
                justify-content: space-between;
                flex-shrink: 0;
                gap: 12px;
              }
              header h1 {
                font-size: 1rem;
                font-weight: 600;
                letter-spacing: 0.5px;
                color: #e0e0e0;
                white-space: nowrap;
              }
              header span {
                font-size: 0.75rem;
                color: #888;
                white-space: nowrap;
              }
              a.download {
                display: inline-block;
                padding: 6px 16px;
                background: #0f3460;
                color: #e0e0e0;
                text-decoration: none;
                border-radius: 4px;
                font-size: 0.85rem;
                border: 1px solid #1a4a8a;
                transition: background 0.2s;
                white-space: nowrap;
                flex-shrink: 0;
              }
              a.download:hover { background: #1a4a8a; }

              /* Desktop: full iframe viewer */
              .viewer {
                flex: 1;
                overflow: hidden;
              }
              iframe {
                width: 100%;
                height: 100%;
                border: none;
                display: block;
              }

              /* Mobile: hide iframe, show action card */
              .mobile-card {
                display: none;
              }

              @media (max-width: 767px) {
                body { overflow: auto; height: auto; min-height: 100vh; }
                header {
                  flex-wrap: wrap;
                  padding: 14px 16px;
                }
                header h1 { font-size: 0.95rem; }
                .viewer { display: none; }
                .mobile-card {
                  display: flex;
                  flex-direction: column;
                  align-items: center;
                  justify-content: center;
                  flex: 1;
                  padding: 48px 24px;
                  gap: 24px;
                  text-align: center;
                }
                .mobile-card p {
                  color: #aaa;
                  font-size: 0.9rem;
                  line-height: 1.6;
                  max-width: 320px;
                }
                a.open-btn {
                  display: inline-block;
                  padding: 14px 32px;
                  background: #0f3460;
                  color: #e0e0e0;
                  text-decoration: none;
                  border-radius: 6px;
                  font-size: 1rem;
                  font-weight: 600;
                  border: 1px solid #1a4a8a;
                  transition: background 0.2s;
                }
                a.open-btn:hover { background: #1a4a8a; }
              }
            </style>
          </head>
          <body>
            <header>
              <h1>Kevin Joseph &mdash; Resume</h1>
              <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
                <span>Updated: ${{ github.event.head_commit.timestamp || 'latest' }}</span>
                <a class="download" href="Kevin_Joseph_Resume_2026.pdf" download>Download PDF</a>
              </div>
            </header>
            <div class="viewer">
              <iframe src="Kevin_Joseph_Resume_2026.pdf#toolbar=0&navpanes=0" title="Kevin Joseph Resume"></iframe>
            </div>
            <div class="mobile-card">
              <p>PDF previews don't render well on small screens. Open the resume directly in your browser for the best experience.</p>
              <a class="open-btn" href="Kevin_Joseph_Resume_2026.pdf" target="_blank" rel="noopener">Open Resume</a>
              <a class="download" href="Kevin_Joseph_Resume_2026.pdf" download>Download PDF</a>
            </div>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true
